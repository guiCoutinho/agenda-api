spring.application.name=api

# =========================
# DATABASE (Docker Compose)
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/unimobili
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# (Opcional, mas ajuda quando se está depurando schema/table names)
spring.jpa.properties.hibernate.default_schema=public

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

# Se você quiser garantir que o Flyway rode antes do Hibernate (normalmente já roda)
# spring.jpa.defer-datasource-initialization=false

# Debug do Flyway (pode deixar enquanto estiver ajustando)
logging.level.org.flywaydb=DEBUG

# =========================
# SECURITY / JWT
# =========================
logging.level.org.springframework.security=DEBUG
api.security.token.secret=${JWT_SECRET:my-secret-key}